services:
  fsrs-studio:
    build: .
    ports:
      - "8000:8000"
    environment:
      - STRIPE_API_KEY=sk_test_dummy1234567890
      - MONGO_URL=mongodb://mongo:27017
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
